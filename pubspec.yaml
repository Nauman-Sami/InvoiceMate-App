name: invoice_app
description: InvoiceMate - Create and manage invoices offline & online.
publish_to: 'none'
version: 1.0.8+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Local Database (Offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  get: ^4.6.6

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # Sharing
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.3
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  flutter_slidable: ^3.1.0
  animate_do: ^3.3.4
  equatable: ^2.0.5

  # Import from CSV / Excel
  file_picker: 8.0.7
  csv: ^6.0.0
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/splash/

# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1557D6"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"

# Native splash shown on every app launch (run: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#EAF1FF"
  image: assets/splash/splash.png
  android_12:
    color: "#EAF1FF"
    image: assets/splash/splash.png
  android: true
  ios: false
